{% extends "../core/base.html" %}

{% block title %}Detalhes do Produto{% endblock %}
{% block content %}
    <h2>Detalhes do Produto</h2>

    {% if item %}
    <p>ID: {{ item.id }}</p>
    <p>Nome: {{ item.nome }}</p>
    <p>Preço: R$ {{ item.preco }}</p>
    {% else %}
    <p>Produto não encontrado</p>
    {% endif %}

    <a href="{% url 'produtos:produto_list' %}">Voltar</a>

{% endblock %}
